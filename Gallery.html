<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>David's Desert Life – Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ff6b35">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="Images/favicon.png">
    <style>
      .gallery-item img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      /* Lightbox nav arrows */
      .lightbox-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0,0,0,0.45);
        color: #fff;
        border: none;
        font-size: 2rem;
        padding: 0.4em 0.7em;
        cursor: pointer;
        border-radius: 4px;
        z-index: 10;
        line-height: 1;
        transition: background 0.2s;
      }
      .lightbox-nav:hover { background: rgba(0,0,0,0.75); }
      .lightbox-nav.prev  { left:  12px; }
      .lightbox-nav.next  { right: 12px; }

      /* Back-to-top button */
      #back-to-top {
        position: fixed;
        bottom: 32px;
        right: 32px;
        background: rgba(0,0,0,0.55);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 46px;
        height: 46px;
        font-size: 1.3rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 999;
      }
      #back-to-top.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #back-to-top:hover { background: rgba(0,0,0,0.8); }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main>
      <div class="page-kicker">Desert life</div>
      <h1>Field notes in color. Rooted here, wandering wide.</h1>
      <p class="lede">Photos from the Sonoran Desert and beyond.</p>
      <section class="gallery-grid" id="gallery">
        <p id="gallery-loading">Loading photos...</p>
      </section>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <div class="lightbox-inner">
        <button class="lightbox-nav prev" id="lightboxPrev">&#8592;</button>
        <div class="lightbox-image-wrapper">
          <img src="" alt="" id="lightboxImage">
        </div>
        <button class="lightbox-nav next" id="lightboxNext">&#8594;</button>
        <div class="lightbox-meta">
          <div>
            <div class="lightbox-title" id="lightboxTitle"></div>
            <div id="lightboxDescription"></div>
          </div>
          <button class="lightbox-close" id="lightboxClose">Close</button>
        </div>
      </div>
    </div>

    <!-- Back to top -->
    <button id="back-to-top" title="Back to top">
      <i class="fa fa-chevron-up"></i>
    </button>

    <div id="footer-placeholder"></div>

    <script>
      const INAT_USER = "theprguy";
      const PER_PAGE  = 200;

      let galleryItems = [];
      let currentIndex = 0;

      async function fetchAllObservations() {
        let page   = 1;
        let allObs = [];
        let total  = null;

        while (true) {
          const url =
            `https://api.inaturalist.org/v1/observations` +
            `?user_login=${INAT_USER}` +
            `&has[]=photos` +
            `&per_page=${PER_PAGE}` +
            `&page=${page}` +
            `&order=desc` +
            `&order_by=observed_on`;

          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`iNaturalist API error: ${resp.status}`);

          const data = await resp.json();
          if (total === null) total = data.total_results;

          allObs = allObs.concat(data.results);

          if (allObs.length >= total || data.results.length === 0) break;
          page++;
        }

        return allObs;
      }

      function buildGallery(observations) {
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('gallery-loading');
        if (loading) loading.remove();

        observations.forEach(obs => {
          if (!obs.photos || obs.photos.length === 0) return;
          if (!obs.taxon) return;

          const photo      = obs.photos[0];
          const thumbUrl   = photo.url.replace('square', 'medium');
          const fullUrl    = photo.url.replace('square', 'large');

          const commonName = obs.taxon.preferred_common_name
                               ? capitalizeWords(obs.taxon.preferred_common_name)
                               : null;
          const sciName    = obs.taxon.name || '';

          const captionText = commonName
            ? `${commonName} <em>(${sciName})</em>`
            : `<em>${sciName}</em>`;

          const titleText = commonName ? `${commonName} (${sciName})` : sciName;

          const figure = document.createElement('figure');
          figure.className = 'gallery-item';
          figure.setAttribute('data-full',        fullUrl);
          figure.setAttribute('data-title',       titleText);
          figure.setAttribute('data-description', '');

          figure.innerHTML = `
            <img src="${thumbUrl}" alt="${titleText}" loading="lazy">
            <figcaption class="gallery-caption">${captionText}</figcaption>
            <span class="gallery-tag">Photo</span>
          `;

          gallery.appendChild(figure);
        });

        galleryItems = Array.from(gallery.querySelectorAll('.gallery-item'));

        if (galleryItems.length === 0) {
          gallery.innerHTML = '<p>No photos found.</p>';
        }
      }

      function capitalizeWords(str) {
        return str.replace(/\b\w/g, c => c.toUpperCase());
      }

      async function loadGallery() {
        try {
          const observations = await fetchAllObservations();
          buildGallery(observations);
        } catch (error) {
          const loading = document.getElementById('gallery-loading');
          if (loading) loading.textContent = 'Gallery temporarily unavailable. Please try again shortly.';
          console.error('Gallery load error:', error);
        }
      }

      loadGallery();

      // Lightbox
      const lightbox            = document.getElementById('lightbox');
      const lightboxImage       = document.getElementById('lightboxImage');
      const lightboxTitle       = document.getElementById('lightboxTitle');
      const lightboxDescription = document.getElementById('lightboxDescription');
      const lightboxClose       = document.getElementById('lightboxClose');
      const lightboxPrev        = document.getElementById('lightboxPrev');
      const lightboxNext        = document.getElementById('lightboxNext');

      function openLightbox(index) {
        currentIndex = index;
        const figure = galleryItems[currentIndex];
        lightboxImage.src               = figure.getAttribute('data-full');
        lightboxImage.alt               = figure.getAttribute('data-title');
        lightboxTitle.textContent       = figure.getAttribute('data-title');
        lightboxDescription.textContent = figure.getAttribute('data-description');
        lightbox.classList.add('open');
        lightboxPrev.style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
        lightboxNext.style.visibility = currentIndex === galleryItems.length - 1 ? 'hidden' : 'visible';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightboxImage.src = '';
      }

      function showPrev() {
        if (currentIndex > 0) openLightbox(currentIndex - 1);
      }

      function showNext() {
        if (currentIndex < galleryItems.length - 1) openLightbox(currentIndex + 1);
      }

      document.getElementById('gallery').addEventListener('click', function(e) {
        const figure = e.target.closest('.gallery-item');
        if (!figure) return;
        const index = galleryItems.indexOf(figure);
        if (index !== -1) openLightbox(index);
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightboxPrev.addEventListener('click', function(e) { e.stopPropagation(); showPrev(); });
      lightboxNext.addEventListener('click', function(e) { e.stopPropagation(); showNext(); });

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener('keydown', function(e) {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape')      closeLightbox();
        if (e.key === 'ArrowLeft')   showPrev();
        if (e.key === 'ArrowRight')  showNext();
      });

      // Back to top
      const backToTop = document.getElementById('back-to-top');

      window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
          backToTop.classList.add('visible');
        } else {
          backToTop.classList.remove('visible');
        }
      });

      backToTop.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    </script>

    <script src="shared.js"></script>
  </body>
</html>
