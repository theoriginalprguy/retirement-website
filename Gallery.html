<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>David's Desert Life – Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      .gallery-item img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="nav-blur"></div>
    
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>
    
    <main>
      <div class="page-kicker">Desert life</div>
      <h1>Scenes from this chapter.</h1>
      <p class="lede">
        Photos from the Sonoran Desert and beyond.
      </p>
      <section class="gallery-grid" id="gallery">
        <p id="gallery-loading">Loading photos...</p>
      </section>
    </main>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <div class="lightbox-inner">
        <div class="lightbox-image-wrapper">
          <img src="" alt="" id="lightboxImage">
        </div>
        <div class="lightbox-meta">
          <div>
            <div class="lightbox-title" id="lightboxTitle"></div>
            <div id="lightboxDescription"></div>
          </div>
          <button class="lightbox-close" id="lightboxClose">Close</button>
        </div>
      </div>
    </div>
    
    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>
    
    <script>
      const CLOUD_NAME = "dlxmgewap";

      const galleryImages = [
        "docent_action_figure_lgx7bc",
        "saguaro_flowrs_and_fruit_dbdm1e",
        "Saguaro_Cross_Section_jrwvca",
        "Rattle_Snake_hmrwed",
        "Road_Runner_kdr7sf",
        "prickly_pear_flowers_and_fruit_t5pl7q",
        "Paper-Spine_Cactus_mxqt5m",
        "Palo_Verde_in_Bloom_e2kwlm",
        "Owl_in_Saguaro_ocy5cj",
        "Mesquite_Pods_qppr3z",
        "Javelina_c1xylv",
        "Hummingbird_vmgbzx",
        "Hummingbird_Nest_bqt9md",
        "Great_Horned_Owl_gpscah",
        "Gopher_Snake_tyg3hr",
        "Gustav_Starck_peoshq",
        "Gila_Woodpecker_clljqd",
        "Gilded_Flicker_fpkvyo",
        "Gilded_Flicker_Woodpecker_o0legd",
        "Gertrude_With_Cactus_ehrlsr",
        "DBG_Groundbreaking_dlxir9",
        "Dagger-Cholla_gdf84v",
        "Gambel_s_Quail_tr3anc",
        "Gertrude_Divine_Webster_baaqg7",
        "DBG_Entrance_1941_gnxckl",
        "DBG_Early_Trail_isyxtc",
        "Curved-Billed_Thrasher_Nest_fe6ulr",
        "DBG_Crested_Saguaro_lmgq0r",
        "Crested_Saguaro_xgkcw8",
        "Curve-Billed_Thrasher_sgn2rs",
        "Cholla_Skeleton_xxaa2a",
        "Cholla_Flower_crezch",
        "Coyote_p1ifja",
        "Cardons_Heritage_Garden_hwmhvv",
        "Cactus_Wren_Nest_m325cl",
        "Agave_hearts_pg_djnfwv",
        "California_King_Snake_dmnt37",
        "Saguaro_Skeleton_rhntsy",
        "Scorpion_xdx5t1",
        "Saguaro_in_Bloom_kjk1f1",
        "Agave_stalk_tjbp5v",
        "desert-bg_kwdmh5",
        "Cactus_Wren_obieiq"
      ];

      function buildGallery() {
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('gallery-loading');
        if (loading) loading.remove();

        galleryImages.forEach(publicId => {
          const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,h_440,c_fill/${publicId}.jpg`;
          const fullUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${publicId}.jpg`;

          const prettyName = publicId
            .replace(/[_-]/g, ' ')
            .replace(/\s[a-z0-9]{4,8}$/, '')
            .replace(/\b\w/g, c => c.toUpperCase())
            .trim();

          const figure = document.createElement("figure");
          figure.className = "gallery-item";
          figure.setAttribute("data-full", fullUrl);
          figure.setAttribute("data-title", prettyName);
          figure.setAttribute("data-description", "");

          figure.innerHTML = `
            <img src="${thumbUrl}" alt="${prettyName}" loading="lazy">
            <figcaption class="gallery-caption">${prettyName}</figcaption>
            <span class="gallery-tag">Photo</span>
          `;

          gallery.appendChild(figure);
        });
      }

      buildGallery();

      // Lightbox
      const lightbox = document.getElementById('lightbox');
      const lightboxImage = document.getElementById('lightboxImage');
      const lightboxTitle = document.getElementById('lightboxTitle');
      const lightboxDescription = document.getElementById('lightboxDescription');
      const lightboxClose = document.getElementById('lightboxClose');

      document.getElementById('gallery').addEventListener('click', function(e) {
        const figure = e.target.closest('.gallery-item');
        if (!figure) return;

        lightboxImage.src = figure.getAttribute('data-full');
        lightboxTitle.textContent = figure.getAttribute('data-title');
        lightboxDescription.textContent = figure.getAttribute('data-description');
        lightbox.classList.add('open');
      });

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightboxImage.src = '';
      }

      lightboxClose.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
      });
    </script>
    
    <!-- Load shared header and footer -->
    <script src="shared.js"></script>
  </body>
</html>
