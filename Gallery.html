<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>David's Desert Life – Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      .gallery-item img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="nav-blur"></div>
    
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>
    
    <main>
      <div class="page-kicker">Desert life</div>
      <h1>Scenes from this chapter.</h1>
      <p class="lede">
        Photos from the Sonoran Desert and beyond.
      </p>
      <section class="gallery-grid" id="gallery">
        <p id="gallery-loading">Loading photos...</p>
      </section>
    </main>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <div class="lightbox-inner">
        <div class="lightbox-image-wrapper">
          <img src="" alt="" id="lightboxImage">
        </div>
        <div class="lightbox-meta">
          <div>
            <div class="lightbox-title" id="lightboxTitle"></div>
            <div id="lightboxDescription"></div>
          </div>
          <button class="lightbox-close" id="lightboxClose">Close</button>
        </div>
      </div>
    </div>
    
    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>
    
    <script>
      const CLOUD_NAME = "dlxmgewap";
      const TAG = "gallery";

      async function loadGallery() {
        try {
          const response = await fetch(
            `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG}.json`
          );

          if (!response.ok) {
            throw new Error('Could not load gallery');
          }

          const data = await response.json();
          buildGallery(data.resources);

        } catch (error) {
          const loading = document.getElementById('gallery-loading');
          if (loading) loading.textContent = 'Gallery temporarily unavailable. Please try again shortly.';
          console.error('Gallery load error:', error);
        }
      }

      function buildGallery(images) {
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('gallery-loading');
        if (loading) loading.remove();

        images.forEach(image => {
          const publicId = image.public_id;
          const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,h_440,c_fill/${publicId}.jpg`;
          const fullUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${publicId}.jpg`;

          const prettyName = publicId
            .replace(/[_-]/g, ' ')
            .replace(/\s[a-z0-9]{4,8}$/, '')
            .replace(/\b\w/g, c => c.toUpperCase())
            .trim();

          const figure = document.createElement("figure");
          figure.className = "gallery-item";
          figure.setAttribute("data-full", fullUrl);
          figure.setAttribute("data-title", prettyName);
          figure.setAttribute("data-description", "");

          figure.innerHTML = `
            <img src="${thumbUrl}" alt="${prettyName}" loading="lazy">
            <figcaption class="gallery-caption">${prettyName}</figcaption>
            <span class="gallery-tag">Photo</span>
          `;

          gallery.appendChild(figure);
        });
      }

      loadGallery();

      // Lightbox
      const lightbox = document.getElementById('lightbox');
      const lightboxImage = document.getElementById('lightboxImage');
      const lightboxTitle = document.getElementById('lightboxTitle');
      const lightboxDescription = document.getElementById('lightboxDescription');
      const lightboxClose = document.getElementById('lightboxClose');

      document.getElementById('gallery').addEventListener('click', function(e) {
        const figure = e.target.closest('.gallery-item');
        if (!figure) return;

        lightboxImage.src = figure.getAttribute('data-full');
        lightboxTitle.textContent = figure.getAttribute('data-title');
        lightboxDescription.textContent = figure.getAttribute('data-description');
        lightbox.classList.add('open');
      });

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightboxImage.src = '';
      }

      lightboxClose.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
      });
    </script>
    
    <!-- Load shared header and footer -->
    <script src="shared.js"></script>
  </body>
</html>
