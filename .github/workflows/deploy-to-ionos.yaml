name: "Deploy Now: Deploy to IONOS"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Please do not rename this job
  deploy-to-ionos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        deployment-id: ["cb11f58d-6f8a-457a-bb88-a7ba320a5b57"]
    steps:
      - uses: actions/checkout@v4
      - uses: ionos-deploy-now/deploy-now-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          branch-id: main
          deployment-id: ${{ matrix.deployment-id }}
          ssh-key: ${{ secrets.IONOS_SSH_KEY }}
          ssh-username: ${{ secrets.IONOS_DEPLOYMENT_CB11F58D_6F8A_457A_BB88_A7BA320A5B57_SSH_USERNAME }}