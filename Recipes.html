    <style>
      .category-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 32px;
      }
      .category-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
        cursor: pointer;
        transition: border-color 0.3s ease, transform 0.2s ease;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .category-card:hover {
        border-color: var(--accent-vibrant);
        transform: translateY(-2px);
      }
      .category-icon-panel {
        height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, var(--accent-strong), var(--accent-vibrant));
        font-size: 2.4rem;
      }
      .category-info {
        padding: 16px 18px;
      }
      .category-name {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--accent-strong);
        margin: 0 0 4px 0;
      }
      .category-count {
        font-size: 0.85rem;
        color: var(--muted);
      }
      .recipe-section {
        display: none;
        margin-top: 8px;
      }
      .recipe-section.active {
        display: block;
      }
      .recipe-section-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 16px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--accent-vibrant);
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .back-btn:hover {
        background: var(--accent-vibrant);
        color: white;
        border-color: var(--accent-vibrant);
      }
      .recipe-section-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--accent-strong);
        margin: 0;
      }
      .recipe-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
      .recipe-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
        cursor: pointer;
        transition: border-color 0.3s ease, transform 0.2s ease;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .recipe-card:hover {
        border-color: var(--accent-vibrant);
        transform: translateY(-2px);
      }
      .recipe-thumb {
        width: 100%;
        height: 140px;
        object-fit: cover;
        display: block;
        background: var(--border);
      }
      .recipe-name {
        padding: 10px 12px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
      }
      .recipe-lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .recipe-lightbox.open {
        display: flex;
      }
      .recipe-lightbox-inner {
        position: relative;
        max-width: 900px;
        width: 100%;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .recipe-lightbox-img {
        max-width: 100%;
        max-height: 82vh;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      }
      .recipe-lightbox-close {
        position: absolute;
        top: -14px;
        right: -14px;
        background: var(--accent-vibrant);
        color: white;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .recipe-lightbox-title {
        margin-top: 12px;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
      }
      @media (max-width: 600px) {
        .category-grid { grid-template-columns: repeat(2, 1fr); }
        .recipe-grid   { grid-template-columns: repeat(2, 1fr); }
      }
    </style>

      // ── Category definitions (top-level nav) ───────────────
      const CATEGORIES = [
        { key:'appetizers-and-dips', label:'Appetizers and Dips', icon:'🥗' },
        { key:'biscuits-and-bread',  label:'Biscuits and Bread',  icon:'🍞' },
        { key:'cakes-and-cookies',   label:'Cakes and Cookies',   icon:'🍰' },
        { key:'candy',               label:'Candy',               icon:'🍬' },
        { key:'casseroles',          label:'Casseroles',          icon:'🥘' },
        {
          key:'desserts', label:'Desserts', icon:'🍮',
          subcategories: [
            { key:'desserts',                    label:'General Desserts'    },
            { key:'desserts/miscellaneous',      label:'Miscellaneous'       },
            { key:'desserts/Pies-and-Pastries',  label:'Pies and Pastries'   },
          ]
        },
        {
          key:'entrees', label:'Entrees', icon:'🍽️',
          subcategories: [
            { key:'entrees',          label:'General Entrees' },
            { key:'entrees/Beef',     label:'Beef'            },
            { key:'entrees/Lamb',     label:'Lamb'            },
            { key:'entrees/Pork',     label:'Pork'            },
            { key:'entrees/Poultry',  label:'Poultry'         },
            { key:'entrees/Seafood',  label:'Seafood'         },
          ]
        },
        { key:'miscellaneous',   label:'Miscellaneous',   icon:'📋' },
        { key:'salads-and-sides',label:'Salads and Sides',icon:'🥙' },
        { key:'sandwiches',      label:'Sandwiches',      icon:'🥪' },
        { key:'soups-stews',     label:'Soups and Stews', icon:'🍲' },
        { key:'vegetables',      label:'Vegetables',      icon:'🥦' },
      ];

      // ── Helpers ────────────────────────────────────────────
      function cleanName(publicId) {
        const filename = publicId.split('/').pop();
        return filename.replace(/_[a-zA-Z0-9]{4,8}$/i, '').replace(/-/g, ' ');
      }

      function thumbUrl(id, fmt) {
        return `https://res.cloudinary.com/${C}/image/upload/w_360,h_280,c_fill,q_auto,f_auto/${id}.${fmt}`;
      }

      function fullUrl(id, fmt) {
        return `https://res.cloudinary.com/${C}/image/upload/q_auto,f_auto/${id}.${fmt}`;
      }

      // ── Build category grid ────────────────────────────────
      function buildCategoryGrid() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = '';
        CATEGORIES.forEach(cat => {
          const count = cat.subcategories
            ? cat.subcategories.reduce((t, s) => t + (RECIPES[s.key] || []).length, 0)
            : (RECIPES[cat.key] || []).length;
          const card = document.createElement('div');
          card.className = 'category-card';
          card.innerHTML = `
            <div class="category-icon-panel">${cat.icon}</div>
            <div class="category-info">
              <div class="category-name">${cat.label}</div>
              <div class="category-count">${count} recipes</div>
            </div>`;
          card.addEventListener('click', () => openCategory(cat));
          grid.appendChild(card);
        });
      }

      // ── Open category ──────────────────────────────────────
      function openCategory(cat) {
        document.getElementById('category-view').style.display = 'none';
        const section = document.getElementById('recipe-section');
        section.classList.add('active');
        document.getElementById('recipe-section-title').textContent = cat.label;
        const grid = document.getElementById('recipe-grid');
        grid.innerHTML = '';

        if (cat.subcategories) {
          // Show subcategory cards first, then any root-level recipes
          cat.subcategories.forEach(sub => {
            const files = RECIPES[sub.key] || [];
            if (files.length === 0) return;
            // Subcategory heading
            const heading = document.createElement('div');
            heading.style.cssText = 'grid-column:1/-1;font-size:1.1rem;font-weight:700;color:var(--accent-strong);margin-top:16px;padding-bottom:6px;border-bottom:2px solid var(--border);';
            heading.textContent = sub.label;
            grid.appendChild(heading);
            files.forEach(f => grid.appendChild(makeRecipeCard(f)));
          });
        } else {
          (RECIPES[cat.key] || []).forEach(f => grid.appendChild(makeRecipeCard(f)));
        }
      }

      // ── Make a recipe card ─────────────────────────────────
      function makeRecipeCard(f) {
        const name = cleanName(f.id);
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `
          <img src="${thumbUrl(f.id, f.fmt)}" alt="${name}" class="recipe-thumb" loading="lazy">
          <div class="recipe-name">${name}</div>`;
        card.addEventListener('click', () => openLightbox(fullUrl(f.id, f.fmt), name));
        return card;
      }

      // ── Lightbox ───────────────────────────────────────────
      function openLightbox(url, name) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox-img').alt = name;
        document.getElementById('lightbox-title').textContent = name;
        document.getElementById('recipe-lightbox').classList.add('open');
      }

      function closeLightbox() {
        document.getElementById('recipe-lightbox').classList.remove('open');
        document.getElementById('lightbox-img').src = '';
      }

      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
      document.getElementById('recipe-lightbox').addEventListener('click', function(e) {
        if (e.target === this) closeLightbox();
      });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

      // ── Back button ────────────────────────────────────────
      document.getElementById('back-btn').addEventListener('click', () => {
        document.getElementById('recipe-section').classList.remove('active');
        document.getElementById('recipe-grid').innerHTML = '';
        document.getElementById('category-view').style.display = '';
      });

      buildCategoryGrid();
    </script>
