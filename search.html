<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - David Kirk</title>
  <meta name="description" content="Search David Kirk's website for articles, photos, projects, and more.">
  <meta name="theme-color" content="#ff6b35">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="Images/favicon.png">

  <!-- Google Custom Search Engine -->
  <script async src="https://cse.google.com/cse.js?cx=d4eb18e73eff54efb"></script>

  <style>
    .search-container {
      max-width: 800px;
      margin: 0 auto;
      min-height: 60px;
      width: 100%;
      box-sizing: border-box;
    }

    .gcse-search,
    .gcse-search *,
    .gsc-control-cse,
    .gsc-control-cse * {
      max-width: 100% !important;
      box-sizing: border-box !important;
    }

    .gsc-control-cse {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    .gsc-input-box {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-lg) !important;
    }

    .gsc-input {
      background: var(--card) !important;
      color: var(--text) !important;
    }

    .gsc-search-button-v2 {
      background: linear-gradient(135deg, var(--accent-vibrant), var(--accent-pink)) !important;
      border: none !important;
      border-radius: 999px !important;
      padding: 10px 20px !important;
    }

    .gsc-result {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-lg) !important;
      padding: 18px !important;
      margin-bottom: 16px !important;
      box-shadow: var(--shadow-soft) !important;
    }

    .gs-title, .gs-title * {
      color: var(--accent-strong) !important;
      text-decoration: none !important;
    }

    .gs-title:hover, .gs-title *:hover {
      color: var(--accent-vibrant) !important;
    }

    .gs-snippet {
      color: var(--text) !important;
      font-size: 0.95rem !important;
      line-height: 1.6 !important;
    }

    .gsc-url-top {
      color: var(--muted) !important;
      font-size: 0.85rem !important;
    }

    .gsc-webResult.gsc-result:hover {
      border-color: var(--accent-vibrant) !important;
    }

    @media (max-width: 600px) {
      .search-container {
        padding: 0;
        width: 100%;
      }
      .gsc-control-cse {
        padding: 0 !important;
        width: 100% !important;
      }
      .gsc-search-box {
        width: 100% !important;
      }
      .gsc-input-box {
        width: 100% !important;
      }
      .gsc-search-button {
        margin-left: 8px !important;
      }
    }
  </style>
</head>
<body>
  <div class="site-wrapper">
    <div id="header-placeholder"></div>

    <div class="site-main">
      <main>
        <div class="page-kicker">Search</div>
        <h1>Find What You're Looking For</h1>
        <p class="lede">Search across articles, photos, and projects on this site.</p>

        <div class="search-container">
          <div class="gcse-search"></div>
        </div>

        <div class="story-card" style="margin-top: 40px;">
          <h2>Search Tips</h2>
          <ul style="margin-left: 20px; color: var(--text);">
            <li>Use specific keywords for better results</li>
            <li>Try different variations of your search terms</li>
            <li>Search works across all page content including headings and text</li>
          </ul>
        </div>
      </main>
    </div>

    <div id="footer-placeholder"></div>
  </div>

  <script src="shared.js"></script>
</body>
</html>
